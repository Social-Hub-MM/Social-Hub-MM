<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub MM | Cyber Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #05050a; --neon-teal: #00f2ff; --neon-purple: #bc13fe;
            --neon-green: #00ff41; --glass: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; padding: 0; background-color: var(--bg-black); font-family: 'Share Tech Mono', 'Padauk', monospace; color: white; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Login UI */
        .login-box { background: var(--glass); backdrop-filter: blur(15px); border-radius: 15px; padding: 30px; width: 320px; text-align: center; border: 1px solid var(--neon-teal); z-index: 100; margin-top: 50px; }
        .brand-title { color: var(--neon-teal); font-size: 1.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px var(--neon-teal); margin-bottom: 5px; }
        .auth-label { color: var(--neon-purple); font-size: 0.6rem; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--neon-purple); border-radius: 5px; color: white; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        .btn-neon { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--neon-teal); color: var(--neon-teal); font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }

        /* Dashboard & Feed */
        #dashboard { display: none; flex-direction: column; gap: 15px; width: 92%; max-width: 500px; margin: 20px auto; z-index: 100; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px; padding: 20px; box-sizing: border-box; }
        .post-input-area textarea { width: 100%; height: 80px; background: rgba(0,0,0,0.3); border: 1px dashed var(--neon-purple); border-radius: 8px; color: white; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 12px; font-family: 'Padauk'; }
        
        /* Post Card Actions (New) */
        .post-card { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--neon-teal); position: relative; }
        .post-actions { display: flex; gap: 20px; margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .action-btn { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .action-btn:hover { color: var(--neon-teal); }
        .action-btn.active { color: var(--neon-teal); text-shadow: 0 0 5px var(--neon-teal); }
        
        .comment-box { margin-top: 10px; display: none; }
        .comment-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--neon-purple); color: white; padding: 8px; border-radius: 5px; font-size: 0.8rem; outline: none; }

        .platform-intro { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(0, 242, 255, 0.1); }
        .neon-text { color: var(--neon-teal); font-size: 0.9rem; text-shadow: 0 0 10px var(--neon-teal); margin-bottom: 8px; }
        .sub-text { color: rgba(255, 255, 255, 0.7); font-size: 0.75rem; line-height: 1.6; font-family: 'Padauk'; }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="login-box" id="loginUI">
        <div class="brand-title">Social-Hub-MM</div>
        <div class="auth-label">Secure Access Point</div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--neon-purple); border-radius: 5px; color: white; margin-bottom: 15px;">
            <input type="password" id="password" placeholder="Password" required style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--neon-purple); border-radius: 5px; color: white; margin-bottom: 15px;">
            <button type="submit" class="btn-neon">Enter Platform</button>
            <div class="platform-intro">
                <p class="neon-text">Connect. Share. Secure.</p>
                <p class="sub-text">မြန်မာနိုင်ငံ၏ ပထမဆုံးသော Cyber-Security အခြေခံ <br> Social Platform မှ ကြိုဆိုပါသည်။</p>
            </div>
        </form>
    </div>

    <div id="dashboard">
        <div class="sidebar glass-panel" style="text-align: center;">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--neon-teal), var(--neon-purple)); border-radius: 50%; margin: 0 auto 10px; border: 2px solid var(--neon-teal);"></div>
            <h3 style="margin: 0;">Admin User</h3>
            <p style="color: var(--neon-green); font-size: 0.7rem;">● Online</p>
        </div>
        <div class="post-input-area glass-panel">
            <textarea id="postContent" placeholder="ဘာတွေတွေးနေလဲ..."></textarea>
            <button onclick="createPost()" style="background: var(--neon-teal); border: none; padding: 10px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; float: right;">Post</button>
        </div>
        <div id="feedList"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const characters = "01MSBH"; const fontSize = 16;
        const columns = canvas.width / fontSize; const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() { ctx.fillStyle = 'rgba(5, 5, 10, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#004d40"; ctx.font = fontSize + 'px monospace'; drops.forEach((y, i) => { const text = characters.charAt(Math.floor(Math.random() * characters.length)); ctx.fillText(text, i * fontSize, y * fontSize); if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(drawMatrix, 40);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (email === "lwink4141@gmail.com" && pass === "lwink4141") {
                document.getElementById('loginUI').style.display = "none";
                const dash = document.getElementById('dashboard');
                dash.style.display = "flex"; setTimeout(() => dash.style.opacity = "1", 50);
                loadPosts();
            } else { window.location.href = "https://www.facebook.com"; }
        });

        function createPost() {
            const content = document.getElementById('postContent').value;
            if (!content.trim()) return;
            const posts = JSON.parse(localStorage.getItem('myPosts')) || [];
            posts.unshift({ id: Date.now(), text: content, date: new Date().toLocaleString(), likes: 0 });
            localStorage.setItem('myPosts', JSON.stringify(posts));
            document.getElementById('postContent').value = "";
            renderPosts(posts);
        }

        function loadPosts() { renderPosts(JSON.parse(localStorage.getItem('myPosts')) || []); }

        function renderPosts(posts) {
            document.getElementById('feedList').innerHTML = posts.map(p => `
                <div class="post-card glass-panel">
                    <h4 style="margin:0; color: var(--neon-teal); font-size: 0.9rem;">Social Hub Admin</h4>
                    <p style="margin: 10px 0; line-height: 1.5; font-family: 'Padauk';">${p.text}</p>
                    <small style="color: grey; font-size: 0.6rem;">${p.date}</small>
                    <div class="post-actions">
                        <button class="action-btn" onclick="toggleLike(this)"><i class="fa-regular fa-thumbs-up"></i> Reaction</button>
                        <button class="action-btn" onclick="toggleComment('${p.id}')"><i class="fa-regular fa-comment"></i> Comment</button>
                    </div>
                    <div id="comment-${p.id}" class="comment-box">
                        <input type="text" class="comment-input" placeholder="Comment တစ်ခုရေးမည်..." onkeypress="if(event.key === 'Enter') this.value=''">
                    </div>
                </div>
            `).join('');
        }

        function toggleLike(btn) {
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            if(btn.classList.contains('active')) {
                icon.className = 'fa-solid fa-thumbs-up';
            } else {
                icon.className = 'fa-regular fa-thumbs-up';
            }
        }

        function toggleComment(id) {
            const box = document.getElementById(`comment-${id}`);
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
